# Space Mouse Configuration for TeleopTwistStampedJoy
teleop:
  ros__parameters:
    # Publishing rate (Hz)
    publish_rate: 10.0
    
    # Scaling factors
    force_scale: 0.60      # Max linear velocity (m/s)
    torque_scale: 0.40     # Max angular velocity (rad/s)
    fine_force_scale: 0.1  # D-pad fine XY nudge magnitude

    x_axis: 0         # Camera pan left/right (Stick X)
    y_axis: 1         # Camera pan up/down (Stick Z)
    z_axis: -1
    z_axis_push: 5         # Camera push (Stick Y)
    z_axis_pull: 2         # Camera pull (Stick Y)
    roll_axis_positive: 5       # Camera roll along positive Z-axis
    roll_axis_negative: 4       # Camera roll along negative Z-axis
    pitch_axis: 4       # Camera pitch along x-axis
    yaw_axis: 3         # Camera yaw along yaxis
    fine_x_axis: 6      # D-pad L/R: right (-1) -> +x, left (+1) -> -x
    fine_y_axis: 7      # D-pad U/D: up (+1) -> -y, down (-1) -> +y
    enable_button: -1       # Safety button to enable/disable control (-1 fr no safety button)

    # Buttons that call orientation_control_node's Trigger services
    # (teleop_node owns Joy parsing for the whole cell, orientation_control_node
    # no longer subscribes to /joy directly).
    orientation_control_enable_button: 0   # toggles orientation control on/off
    visualize_normal_button: 9             # toggles normal-estimation visualization
    save_data_button: 8                    # toggles orientation-control data logging
    orientation_control_node_name: orientation_controller

    # Buttons that call the autofocus node's Trigger services.
    autofocus_record_button: 2             # (X) toggles peak recording
    autofocus_drive_button: 3              # (Y) toggles PD drive-to-peak
    autofocus_node_name: autofocus
    # "All stop" (B): disables orientation + autofocus controllers at once.
    disable_controllers_button: 1

    invert_x: true    # Invert X-axis (left/right)
    invert_y: true   # Invert Y-axis (up/down)
    invert_z: false   # Invert Z-axis (push/pull)
    invert_roll: false  # Invert roll axis (clockwise/counter-clockwise)
    invert_pitch: false  # Invert pitch axis (up/down)
    invert_yaw: true    # Invert yaw axis (left/right)
            
    # Deadzone to prevent drift (Xbox controllers typically need higher deadzone)
    deadzone: 0.05
    
    # Frame ID for the twist messages
    frame_id: "eoat_camera_link"
    
    # Topic names
    joy_topic: "/joy"
    twist_topic: "/teleop/wrench_cmds"  # Updated topic for inspection cell

