# Admittance (coupled-pendulum plant) config for the Tier 3 variant.
# Re-keyed to the coupled-pendulum node name, and pointed at the coupled-pendulum
# orientation node's wrench + pivot topics.
admittance_control:
  ros__parameters:
    # Publishing rate (Hz). Feeds Servo's 500 Hz loop; kept high so the twist
    # command isn't a 10 Hz staircase that Servo's finite-difference velocity
    # output turns into jitter on the forward_velocity_controller.
    publish_rate: 250.0

    sphere_mass: 2.5 # mass of the object in kg for force control (kg)
    sphere_radius: 0.65  # Radius of the virtual sphere for admittance control (meters)
    fluid_viscosity: 1.0  # Viscosity coefficient for damping (Pa·s)

    # Frame ID for the twist messages (must match the orientation node's
    # main_camera_frame, since pivot r is published in that frame).
    frame_id: "eoat_camera_link"

    # Topic names
    teleop_wrench_topic: "/teleop/wrench_cmds"
    # Tier 3: subscribe to the coupled-pendulum orientation node (pure torque wrench).
    orientation_wrench_topic: "/orientation_controller/wrench_cmds"
    autofocus_wrench_topic: "/autofocus/wrench_cmds"
    servo_twist_topic: "/servo_node/delta_twist_cmds"

    # Tier 3 coupled pendulum: pivot lever arm r (= camera - A) + staleness timeout.
    pivot_topic: "/orientation_controller/pivot_r"
    pivot_timeout: 0.2
